{{- if .Values.ingress.enabled -}}
{{- $fullName := include "vegbank.fullname" . -}}
{{- $svcPort := .Values.service.port -}}
{{- $inferredHostname := .Values.ingress.hostname | default "" -}}
{{- $tlsSecretName := .Values.ingress.tlsSecretName | default "ingress-nginx-tls-cert" -}}
{{- $tlsEnabled := true -}}
{{- if hasKey .Values.ingress "tlsEnabled" -}}
{{- $tlsEnabled = .Values.ingress.tlsEnabled -}}
{{- end -}}
{{- $hasHosts := gt (len (.Values.ingress.hosts | default (list))) 0 -}}
{{- $hasTls := gt (len (.Values.ingress.tls | default (list))) 0 -}}
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: {{ $fullName }}
  labels:
    {{- include "vegbank.labels" . | nindent 4 }}
  {{- with .Values.ingress.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
spec:
  {{- if .Values.ingress.className }}
  ingressClassName: {{ .Values.ingress.className }}
  {{- end }}
  {{- if and $tlsEnabled (or $hasTls $inferredHostname) }}
  tls:
    {{- if $hasTls }}
    {{- range .Values.ingress.tls }}
    - hosts:
        {{- range .hosts }}
        - {{ . | quote }}
        {{- end }}
      secretName: {{ .secretName }}
    {{- end }}
    {{- else }}
    - hosts:
        - {{ $inferredHostname | quote }}
      secretName: {{ $tlsSecretName }}
    {{- end }}
  {{- end }}
  {{- if or $hasHosts $inferredHostname }}
  rules:
    {{- if $hasHosts }}
    {{- range .Values.ingress.hosts }}
    - host: {{ .host | quote }}
      http:
        paths:
          {{- range .http.paths }}
          - path: {{ .path }}
            pathType: {{ .pathType | default "Prefix" }}
            backend:
              service:
                name: {{ $fullName }}
                port:
                  number: {{ $svcPort }}
          {{- end }}
    {{- end }}
    {{- else }}
    - host: {{ $inferredHostname | quote }}
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: {{ $fullName }}
                port:
                  number: {{ $svcPort }}
    {{- end }}
  {{- end }}
{{- end }}
