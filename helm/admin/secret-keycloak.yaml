#
# Keycloak OIDC client secret for VegBank.
#
# This secret is NOT applied via `kubectl apply`. Instead, it is created from
# the client-secrets.json file to avoid duplicating credentials across files.
#
# Steps:
#   1. Fill in real values in helm/admin/client-secrets.json
#      (client_id, client_secret, server_metadata_url, redirect_uris)
#
#   2. Create the secret from the file:
#      kubectl create secret generic vegbank-keycloak-oidc-config \
#        --from-file=client_secrets.json=helm/admin/client-secrets.json \
#        -n <namespace>
#
#   3. To update later:
#      kubectl create secret generic vegbank-keycloak-oidc-config \
#        --from-file=client_secrets.json=helm/admin/client-secrets.json \
#        -n <namespace> --dry-run=client -o yaml | kubectl apply -f -
#
# The secret will be mounted into the pod at /etc/vegbank/oidc/client_secrets.json
# and read by the app via the KEYCLOAK_CLIENT_SECRETS_FILE environment variable.
