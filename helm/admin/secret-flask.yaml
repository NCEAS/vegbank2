#
# Flask session signing secret for VegBank.
#
# This secret MUST be stable across pod restarts so that user sessions
# remain valid after a deployment or pod reschedule. Without it, a new
# random key is generated every restart, invalidating all active sessions.
#
# Steps:
#   1. Generate a strong random key locally:
#      python3 -c "import secrets; print(secrets.token_hex(32))"
#
#   2. Create the secret:
#      kubectl create secret generic vegbank-flask-secret \
#        --from-literal=secret_key=<paste-generated-key-here> \
#        -n <namespace>
#
# The secret is consumed by the deployment as the FLASK_SECRET_KEY env var.
