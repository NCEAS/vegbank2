## These are the default Values for deploying Vegbank. You will likely need to override some of
## these values for your own environment. See the helm README for instructions.
##
## For example, to deploy on the NCEAS dev k8s cluster, we use the overrides defined in the files
## under 'vegbank2/helm/examples' (assuming you're in the root of the vegbank2 repo):
##
## 1. to deploy the newest pre-published chart to the dev-vegbank context:
##
##     $ helm install --upgrade  vegbankapi  -n vegbank  oci://ghcr.io/nceas/charts/vegbank \
##                           -f helm/examples/values-overrides-dev-vb.yaml --debug
##
## (Published charts and their version numbers can be found at:
##            https://github.com/NCEAS/vegbank/pkgs/container/charts%2Fvegbank )
##
## 2. to deploy a local copy of the helm chart (for development) to the dev-vegbank-dev context:
##
##      $ helm install --upgrade vegbankapi -n vegbank-dev ./helm \
##                         -f helm/examples/values-overrides-dev-vb-dev.yaml --debug
##
##

## @param replicaCount  The number of API pods to be created when the chart is installed.
## Setting greater than 1 ensures no downtime during upgrades
##
replicaCount: 1

## @section API Access - Authentication and Authorization
##
auth:
  ## @param auth.accessMode Controls authentication & upload behavior (RW or RO) for API access
  ## - "read_only": No authentication, no uploads (default, for security)
  ## - "authenticated": Full authentication and authorization required
  ## - "open": No authentication, uploads allowed
  ##
  ## "read_only" (the default) or "authenticated" should be used for public-facing deployments.
  ## "open" should be used only for testing in secure environments.
  ##
  accessMode: "read_only"

  ## @param auth.oidcSecretName Name of the Kubernetes secret containing client_secrets.json
  ## Credentials for OpenID Connect (OIDC) authentication are mounted as a Kubernetes secret into
  ## the pod and read by the Flask app. Never commit sensitive credentials to git.
  ##
  oidcSecretName: vegbank-oidc-config

  ## @param auth.roleName.admin Scope name for the admin role
  ## @param auth.roleName.contributor Scope name for the contributor role
  ## @param auth.roleName.user Scope name for the user role
  ## These scope names are used for authorization decisions. Override them per environment
  # New deployment setup: After choosing a deployment name (e.g., `dev-vegbank-dev`),
  # contact the Keycloak admin to register a new client. Provide the deployment name, required scopes and redirect URIs. 
  # Then update this config with the new client ID and secret.
  ## (e.g., use "vegbank-dev:admin" in dev) so that dev and prod Keycloak realms stay separate.
  ##
  roleName:
    admin: "vegbank:admin"
    contributor: "vegbank:contributor"
    user: "vegbank:user"

## @section Database
## Configuration for the PostgreSQL database used by VegBank. The username and password are
## stored in a kubernetes secret named 'vegbankdbcreds', which is created separately from this
## chart.
##
database:
  ## @param database.name The name of the postgres database to be used by VegBank
  ##
  name: vegbank
  ## @param database.host hostname of database to be used by VegBank (RW svc name of CNPG or pooler)
  ##
  host: vegbankdb-cnpg-rw
  ## @param database.port port to connect to the database (Must match CNPG or pooler port number)
  ##
  port: 5432
  ## @param database.existingSecret Secret containing the database username and password.
  ## The secret should be manually created before deploying the database or this chart.
  ## It must be of type kubernetes.io/basic-auth; must contain the exact key names: 'username'
  ## and 'password', and the username must match the value of dbUser in your cnpg cluster config.
  ##
  existingSecret: vegbankdbcreds

databaseRestore:
  ## @param databaseRestore.enabled Restores a full (schema+data) database dump file defined below
  ## Reminder, the initContainer postgres image should be the same as the CNPG postgres version -
  ## see below
  ##
  enabled: false
  ## @param databaseRestore.pvc PVC containing the (schema+data) database dump file to restore
  ##
  pvc: "vegbankdb-init-pgdata"
  ## @param databaseRestore.mountpath Mount path inside the container for the pvc/dump file volume
  ## (No trailing slash)
  ##
  mountpath: "/tmp/databaseRestore"
  ## @param databaseRestore.filepath dump file path, relative to databaseRestore.mountpath
  ## (No leading slash)
  ##
  filepath: "vegbank_full_fc_v1.9_pg16_20250924.dump"
  ## @param databaseRestore.postgresImage postgres image used by initContainer (*must match CNPG postgres version*)
  ##
  postgresImage: postgres:17

flyway:
  image:
    ## @param flyway.image.repository docker image repository for flyway, used in initContainer
    repository: flyway/flyway
    ## @param flyway.image.pullPolicy How often should flyway image be pulled from repository?
    pullPolicy: IfNotPresent
    ## @param flyway.image.tag The tag of the flyway image to use in the initContainer
    ##
    tag: "12.1"
  ## @param flyway.dbpath The path to the directory containing the flyway migration files
  ##
  dbpath: /opt/local/flyway/db
  ## @param flyway.dbHost hostname for flyway's direct connection to the database (not via pooler!)
  ##
  dbHost: vegbankdb-cnpg-rw
  ## @param flyway.dbPort port for flyway's direct connection to the database (not via pooler!)
  ##
  dbPort: 5432

## @section VegBank API Docker Image
## Configuration for the docker image of the Flask API.
image:
  ## @param image.repository GitHub remote image repository address for the VegBank Docker Image
  ##
  repository: ghcr.io/nceas/vegbank
  ## @param image.pullPolicy How often should the image be pulled from the repository?
  ## Set to Always for local development, IfNotPresent for production.
  ##
  pullPolicy: IfNotPresent
  ## @param image.tag version/tag of the VB Docker Image to use. Leave blank to use Chart default
  ## that is defined in the 'appVersion' field in Chart.yaml
  ##
  tag: ""  # Override docker image version for development builds

## @param resources
resources: {}
  ## Instead of specifying default resources, leave this as a conscious choice for the user.
  ## This also helps when running on environments with few resources, such as Minikube.
  ## To specify resources, uncomment the following lines, adjust them as necessary, and
  ## remove the curly braces after 'resources:'.
  # limits:
  #   cpu: 100m
  #   memory: 128Mi
  # requests:
  #   cpu: 1000m
  #   memory: 4Mi

## @section Probes

## Startup Probe
## Liveness and readiness probes are disabled until the startupProbe passes.
## If the startupProbe fails more than 'failureThreshold' times, the container is restarted.
## @param startupProbe.enabled Enable startupProbe
## @param startupProbe.httpGet.path The url path to probe during startup
## @param startupProbe.httpGet.port The named containerPort to probe
##

startupProbe:
  enabled: true
  httpGet:
    path: /
    port: http
  ## Optional values:
  ## @param startupProbe.successThreshold Min consecutive successes for probe to be successful
  ## @param startupProbe.failureThreshold No. of consecutive failures before the container restarted
  ## @param startupProbe.periodSeconds Interval (in seconds) between startup checks
  ## @param startupProbe.timeoutSeconds Timeout (in seconds) for each startup check
  successThreshold: 1
  failureThreshold: 36
  periodSeconds: 5
  timeoutSeconds: 3

## Liveness Probe
## Periodic probe of container service liveness. If the probe fails, container will be restarted.
## In production, where we usually have more than one container, livenessProbe does not need to be
## too aggressive, because readinessProbe failures will remove unresponsive pods from service
##
## @param livenessProbe.enabled Enable livenessProbe
## @param livenessProbe.httpGet.path The url path to probe
## @param livenessProbe.httpGet.port The named containerPort to probe
## Optional values:
## @param livenessProbe.periodSeconds Period seconds for livenessProbe
## @param livenessProbe.timeoutSeconds Timeout seconds for livenessProbe
## @param livenessProbe.successThreshold Min consecutive successes for probe to be successful
## @param livenessProbe.failureThreshold No. consecutive failures before container restarted
##
livenessProbe:
  enabled: true
  httpGet:
    path: /
    port: http
  periodSeconds: 20
  timeoutSeconds: 10
  successThreshold: 1
  failureThreshold: 15

## Readiness Probe
## Periodic probe of container service readiness. If the probe fails, container will be removed
## from service endpoints (but will not be restarted unless livenessProbe fails). In production,
## where we usually have more than one container, this allows Kubernetes to stop sending traffic
## to a container that is not ready to handle it, without causing downtime
##
## @param readinessProbe.enabled Enable readinessProbe
## @param readinessProbe.httpGet.path The url path to probe
## @param readinessProbe.httpGet.port The named containerPort to probe
## Optional values:
## @param readinessProbe.periodSeconds Period seconds for readinessProbe
## @param readinessProbe.timeoutSeconds Timeout seconds for readinessProbe
## @param readinessProbe.successThreshold Min consecutive successes for probe to be successful
## @param readinessProbe.failureThreshold No. consecutive failures before container marked unhealthy
##
readinessProbe:
  enabled: true
  httpGet:
    path: /
    port: http
  periodSeconds: 10
  timeoutSeconds: 5
  successThreshold: 1
  failureThreshold: 3

## @section Service
## Port and type for the service that will connect the ingress to the Flask API. There is no service section in the ingress
## as the ingress automatically pulls the default named service for the pod via release name.
##
service:
  ## @param service.type The type of service to create.
  type: ClusterIP
  ## @param service.port The port on which the service will be exposed.
  port: 8000

## @section Gunicorn Server
## Configuration for the Gunicorn server that runs the Flask API. The Gunicorn bind port is set to
## match the
## the value of service.port, above
##
gunicorn:
  ## @param gunicorn.workers Number of worker processes for handling requests.
  ## More workers can handle more requests simultaneously, but note that they also require more cpu
  ## and memory - so be sure to adjust the 'resources:' section accordingly.
  ## A common recommendation for workers is (2 x num_cores) + 1. A default setting of 5 workers is
  ## reasonable, which would require at least 2 cpu cores (2 x 2 + 1). Scaling would ideally be done
  ## by increasing the number of replicas (pods) rather than increasing the number of workers, but
  ## this can be adjusted based on the needs and resources of your environment.
  ##
  workers: 5
  ## @param gunicorn.timeout Workers silent for more than this many seconds are killed and restarted
  ## We override the default 30 seconds, since it's too short for some of VegBank's longer-running
  ## API calls
  ##
  timeout: 2400
  ## @param gunicorn.logLevel Granularity of gunicorn logs (debug|info|warning|error|critical)
  ##
  logLevel: "info"

## @section Ingress
## Configuration for the ingress, including certifications and host name. There is no configured
## service section here because the ingress automatically pulls the default named service for the
## pod via release name. The section establishing that service is above.
ingress:
  ## @param ingress.enabled Enable ingress to allow web traffic. Ingress settings ignored if 'false'
  ##
  enabled: false
  ## @param ingress.className The class of the ingress controller to use.
  ##
  className: nginx
  ## @param ingress.hostname Simple hostname mode: ingress auto-generated if `ingress.hosts` empty
  ## The chart uses this hostname and infers a default path (Prefix "/") and TLS block if
  ## `ingress.hosts` and `ingress.tls` are empty. If `ingress.hosts` or `ingress.tls` are not
  ## empty, those take precedence over this hostname and the inferred TLS settings.
  ##
  hostname: localhost
  ## @param ingress.hosts Full ingress host/path subtree (advanced mode).
  ## If provided (non-empty), this takes precedence over `ingress.hostname`.
  ## Example:
  ##  hosts:
  ##    - host: "api-dev.vegbank.org"
  ##      http:
  ##        paths:
  ##          - path: /
  ##            pathType: Prefix
  ##            backend:
  ##              service:
  ##                name: vegbankapi
  ##                port:
  ##                  number: 80
  ##
  hosts: []
  ## @param ingress.tlsEnabled Set to 'false', to disable rendering Ingress TLS (HTTP-only).
  ## If true, and ingress.tls is empty, the ingress TLS entry will be inferred from ingress.hostname
  ## and the TLS secret name will be pulled from ingress.tlsSecretName.
  ## If true, and ingress.tls is NOT empty, that takes precedence over the inferred TLS settings.
  ##
  tlsEnabled: true
  ## @param ingress.tlsSecretName Secret name used by inferred TLS when `ingress.tls` is empty.
  ##
  tlsSecretName: ingress-nginx-tls-cert

  ## @param ingress.tls Full TLS subtree (advanced mode). Ignored unless ingress.enabled is true.
  ## If provided (non-empty), this takes precedence over inferred TLS from `ingress.hostname`.
  ## If set, cert-manager will attempt to provision TLS certificates for the specified hosts
  ## ingress.tls.hosts: The hostname for TLS config
  ## ingress.tls.secretName: Name of the secret holding the TLS cert(s)
  ##
  ## Example:
  ##  tls:
  ##    - hosts:
  ##        - vegbank.org
  ##      secretName: ingress-nginx-tls-cert
  ##
  ## To disable TLS altogether (i.e. use http only), set:
  ##    tlsEnabled: false
  ##
  tls: []

