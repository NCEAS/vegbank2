# Default values for VegBank.
# This is a YAML-formatted file.

## @param replicaCount  The number of API pods to be created when the chart is installed. 
##
replicaCount: 2

## @section API Deployment Mode
## Controls authentication and upload behavior across the deployment.
## This is the primary configuration for the API's operational state.

## @param deploymentMode Deployment mode controlling API behavior.
## - `read_only`: No authentication, no uploads.
## - `open`: No authentication, uploads allowed.
## - `authenticated`: Full authentication and authorization required.
##
## Default: `authenticated`
deploymentMode: "authenticated"

## @param oidcRedirectUri - Explicit OIDC redirect URI used in the login flow.
oidcRedirectUri: "https://api-dev.vegbank.org/authorize"

## @section Database
## Configuration for the PostgreSQL database used by VegBank. The username and password are
## stored in a kubernetes secret named 'vegbankdbcreds', which is created separately from this
## chart.
##
database:
  ## @param database.name The name of the postgres database to be used by VegBank
  ##
  name: vegbank
  ## @param database.host hostname of database to be used by VegBank (RW svc name of CNPG or pooler)
  ##
  host: vegbankdb2-cnpg-rw
  ## @param database.port port to connect to the database (Must match CNPG or pooler port number)
  ##
  port: 5432

databaseRestore:
  ## @param databaseRestore.enabled Restores a full (schema+data) database dump file defined below
  ## Reminder, the initContainer postgres image should be the same as the CNPG postgres version -
  ## see below
  ##
  enabled: false
  ## @param databaseRestore.pvc PVC containing the (schema+data) database dump file to restore
  ##
  pvc: "vegbankdb-init-pgdata"
  ## @param databaseRestore.mountpath Mount path inside the container for the pvc/dump file volume
  ## (No trailing slash)
  ##
  mountpath: "/tmp/databaseRestore"
  ## @param databaseRestore.filepath dump file path, relative to databaseRestore.mountpath
  ## (No leading slash)
  ##
  filepath: "vegbank_full_fc_v1.9_pg16_20250924.dump"
  ## @param databaseRestore.postgresImage postgres image used by initContainer (*must match CNPG postgres version*)
  ##
  postgresImage: postgres:17

flyway:
  image:
    ## @param flyway.image.repository docker image repository for flyway, used in initContainer
    repository: flyway/flyway
    ## @param flyway.image.pullPolicy How often should flyway image be pulled from repository?
    pullPolicy: IfNotPresent
    ## @param flyway.image.tag The tag of the flyway image to use in the initContainer
    ##
    tag: "12.0.2"
  ## @param flyway.dbpath The path to the directory containing the flyway migration files
  ##
  dbpath: /opt/local/flyway/db
  ## @param flyway.dbHost hostname for flyway's direct connection to the database (not via pooler!)
  ##
  dbHost: vegbankdb2-cnpg-rw
  ## @param flyway.dbPort port for flyway's direct connection to the database (not via pooler!)
  ##
  dbPort: 5432

## @section VegBank API Docker Image
## Configuration for the docker image of the Flask API.
image:
  ## @param image.repository GitHub remote image repository address for the VegBank Docker Image
  repository: ghcr.io/nceas/vegbank
  ## @param image.pullPolicy How often should the image be pulled from the repository?
  ## Set to Always for local development, IfNotPresent for production. 
  pullPolicy: IfNotPresent

## @param imagePullSecrets
imagePullSecrets: []
## @param nameOverride
nameOverride: ""
## @param fullnameOverride
fullnameOverride: ""

## @param podAnnotations currently unused
podAnnotations: {}
## @param podLabels
podLabels: {}

## @param podSecurityContext
podSecurityContext: {}
  # fsGroup: 2000

## @param securityContext
securityContext: {}
  # capabilities:
  #   drop:
  #   - ALL
  # readOnlyRootFilesystem: true
  # runAsNonRoot: true
  # runAsUser: 1000

## @section Service
## Port and type for the service that will connect the ingress to the Flask API. There is no service section in the ingress 
## as the ingress automatically pulls the default named service for the pod via release name. 
service: 
  ## @param service.type The type of service to create.
  type: ClusterIP
  ## @param service.port The port on which the service will be exposed.
  port: 80

## @section Ingress
## Configuration for the ingress, including certifications and host name. There is no configured service section here because the ingress
## automatically pulls the default named service for the pod via release name. The section establishing that service is above. 
ingress: 
  ## @param ingress.enabled Enable ingress to allow web traffic
  enabled: true
  ## @param ingress.className The class of the ingress controller to use.
  className: nginx
  annotations:
    ## @param ingress.annotations.cert-manager.io/cluster-issuer
    cert-manager.io/cluster-issuer: "letsencrypt-prod" 
  hosts:
    ## @param ingress.hosts[0].host The host names for the ingress.
    - host: api-dev.vegbank.org
      paths:
        ## @param ingress.hosts[0].paths[0].path The path for the ingress.
        - path: /
        ## @param ingress.hosts[0].paths[0].pathType The type of path matching to use.
          pathType: Prefix 
  ## Host name and secret name for the TLS certification. Host name must be changed between DEV and PRD, secret name does not.
  tls: 
      ## @param ingress.tls[0].hosts The host names for the TLS certification.
    - hosts: 
        - api-dev.vegbank.org 
      ## @param ingress.tls[0].secretName The name of the secret containing the TLS certificate.
      secretName: ingress-nginx-tls-cert 

## @param resources
resources: {}
  # We usually recommend not to specify default resources and to leave this as a conscious
  # choice for the user. This also increases chances charts run on environments with little
  # resources, such as Minikube. If you do want to specify resources, uncomment the following
  # lines, adjust them as necessary, and remove the curly braces after 'resources:'.
  # limits:
  #   cpu: 100m
  #   memory: 128Mi
  # requests:
  #   cpu: 100m
  #   memory: 128Mi

## @section Probes
livenessProbe:
  httpGet:
    ## @param livenessProbe.httpGet.path The path to use for the liveness probe.
    path: /
    ## @param livenessProbe.httpGet.port The port to use for the liveness probe.
    port: 80
readinessProbe:
  httpGet:
    ## @param readinessProbe.httpGet.path The path to use for the readiness probe.
    path: /
    ## @param readinessProbe.httpGet.port The port to use for the readiness probe.
    port: 80

## @section Miscellaneous

serviceAccount:
  ## @param serviceAccount.create Specifies whether a service account should be created
  create: true
  ## @param serviceAccount.automount Automatically mount a ServiceAccount's API credentials?
  automount: true
  ## @param serviceAccount.annotations Annotations to add to the service account
  annotations: {}
  ## @param serviceAccount.name The name of the service account to use.
  # If not set and create is true, a name is generated using the fullname template
  name: ""

autoscaling:
  ## @param autoscaling.enabled
  enabled: false
  ## @param autoscaling.minReplicas
  minReplicas: 1
  ## @param autoscaling.maxReplicas
  maxReplicas: 100
  ## @param autoscaling.targetCPUUtilizationPercentage
  targetCPUUtilizationPercentage: 80
  # targetMemoryUtilizationPercentage: 80

## @param volumeMounts Additional volumeMounts on the output Deployment definition.
volumeMounts: []
# - name: foo
#   mountPath: "/etc/foo"
#   readOnly: true

## @param nodeSelector
nodeSelector: {}

## @param tolerations
tolerations: []

## @param affinity
affinity: {}
